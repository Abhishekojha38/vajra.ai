<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7931e"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="edge-active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#ff6b35;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="bolt-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="node-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clean white background -->
  <rect width="320" height="90" fill="#ffffff"/>

  <!-- ── Neural graph icon ── -->

  <!-- Passive edges -->
  <line x1="20" y1="20" x2="40" y2="12" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="14" y2="42" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="40" y2="32" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="40" y1="12" x2="62" y2="18" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="40" y1="32" x2="62" y2="18" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="40" y1="32" x2="62" y2="40" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="14" y1="42" x2="40" y2="32" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="14" y1="42" x2="32" y2="60" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="32" y1="60" x2="52" y2="68" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="62" y1="40" x2="52" y2="68" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="62" y1="18" x2="62" y2="40" stroke="#d1d5db" stroke-width="1.2"/>
  <line x1="40" y1="32" x2="52" y2="68" stroke="#d1d5db" stroke-width="1.2"/>

  <!-- Active signal path through the graph -->
  <line x1="40" y1="12" x2="40" y2="32" stroke="url(#edge-active)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="14" y2="42" stroke="url(#edge-active)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="62" y2="40" stroke="url(#edge-active)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Passive nodes -->
  <circle cx="20" cy="20" r="3.5" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="62" cy="18" r="3.5" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="14" cy="42" r="3.5" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="62" cy="40" r="3.5" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="32" cy="60" r="3.5" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <circle cx="52" cy="68" r="3.5" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>

  <!-- Active nodes on the signal path -->
  <circle cx="40" cy="12" r="4"  fill="#ff6b35" filter="url(#node-glow)"/>
  <circle cx="40" cy="32" r="5"  fill="#ff6b35" filter="url(#node-glow)"/>

  <!-- Lightning bolt — the active signal running through the hub -->
  <polygon
    points="43,19  38,32  41.5,32  37,45  46,31  42,31  45,19"
    fill="url(#bolt-grad)"
    filter="url(#bolt-glow)"/>

  <!-- ── Wordmark ── -->
  <text x="86" y="48"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="34"
        letter-spacing="-0.5"
        fill="url(#text-grad)">Aham</text>

  <!-- Tagline: I am -->
  <text x="88" y="65"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400"
        font-size="10.5"
        letter-spacing="3.5"
        fill="#ff6b35"
        opacity="0.9">I  A M</text>

  <!-- Separator dot -->
  <circle cx="183" cy="61" r="1.5" fill="#1a1a2e" opacity="0.25"/>

  <!-- Sanskrit: अहम् -->
  <text x="191" y="65"
        font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif"
        font-weight="300"
        font-size="11"
        letter-spacing="1"
        fill="#1a1a2e"
        opacity="0.3">अहम्</text>

</svg>
