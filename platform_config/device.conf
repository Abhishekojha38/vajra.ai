# platform_config/device.conf — Serial device registry for Aham AI
#
# This file lives at <workspace>/platform_config/device.conf.
# platform_config/ is the central location for all board- and
# hardware-specific configuration (device profiles, pin maps, etc.).
#
# Each [section] defines a named device profile.
# The LLM passes "device": "<name>" in a serial_exec tool call;
# all other parameters are resolved from this file automatically.
#
# Fields:
#   port              Required. /dev/ttyUSBx or /dev/ttyACMx
#   baud              Baud rate (default: 115200)
#   prompt            Shell prompt string that marks end of command output
#   no_login          true → skip login, shell is already active on connect
#   username          Login username (omit or leave blank to skip login)
#   password          Login password (leave blank for passwordless login)
#   login_prompt      Custom string the device prints before the username field
#                     (e.g. "m1700 login"). Auto-detected if omitted.
#   timeout           Per-command timeout in seconds (default: 10)
#   login_timeout     Max seconds for the full login sequence (default: 30)
#   inter_cmd_delay   Pause between commands in seconds (default: 0.3)
#
# To list available devices, ask: "what serial devices are configured?"
# The agent will read this file and summarise the entries.

# Device with login

[Device1]
port            = /dev/tty
baud            =
username        = [USERNAME]
password        = [PASSWORD]
login_prompt    =
prompt          =
timeout         =
login_timeout   =
inter_cmd_delay =

