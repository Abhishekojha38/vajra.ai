# Aham AI Agent — Configuration
#
# This file is the single place for all runtime settings.
# Secrets (API keys) go in .env — everything else lives here.
#
# Priority: shell env > .env (secrets only) > this file > built-in defaults
# See RUNNING.md for all run options.

[provider]
# type: ollama (default, local) | openrouter | groq | together | openai
type  = ollama
model = mistral-nemo:12b

# Local Ollama
# ollama_url is only used when type = ollama.
# Remote providers (groq, openrouter, openai, …) use built-in URLs from the
# registry and do NOT read this key — set api_url only for self-hosted endpoints.
ollama_url = http://localhost:11434   # override if Ollama runs elsewhere

# Remote providers (direct — own libcurl implementation)
# Known providers (openrouter, groq, together, openai) have built-in URLs.
# Just set type, model, and api_key — no api_url needed.
#
# Groq:
# type    = groq
# model   = meta-llama/llama-4-scout-17b-16e-instruct
# api_key = gsk_...
#
# OpenRouter:
# type    = openrouter
# model   = 
# api_key = sk-or-...
#
# OpenAI:
# type    = openai
# model   = gpt-4o
# api_key = sk-...
#
# Together AI:
# type    = together
# model   = 
# api_key = ...

[agent]
max_iterations = 10
# max_messages: compact history when it exceeds this many messages.
# 0 = use the compiled-in maximum (128).
# Tune down if your model has a small context window or low TPM quota.
# Leave at 0 for models with large context windows (100K+).
max_messages   = 0

[paths]
workspace  = .
templates  = templates

[security]
allowlist = allowlist.conf

[gateway]
port      = 8080
html_path = assets/chat.html

[heartbeat]
interval = 60

[logging]
# level: debug | info | warn | error  (default: warn)
# Equivalent to --log-level flag or LOG_LEVEL env var.
level = warn

# file: append all log output to this path (optional)
# file = /var/log/aham.log

[tmux]
socket = /tmp/aham-tmux.sock
